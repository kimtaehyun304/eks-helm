apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: delay
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: delay=277707114689.dkr.ecr.ap-northeast-2.amazonaws.com/tama-api/delay
    argocd-image-updater.argoproj.io/delay.update-strategy: newest-build
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: master
spec:
  project: default
  source:
    repoURL: https://github.com/kimtaehyun304/eks-helm.git
    targetRevision: master
    path: delay
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true